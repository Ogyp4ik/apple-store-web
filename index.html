<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Яблочный магазин</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="container" id="app">
        <!-- Содержимое будет динамически подставляться из app.js -->
    </div>
    <button class="gradient-btn" id="customOrderBtn">📦 Заказать под заказ</button>

    <!-- Модальное окно -->
    <div id="customModal" class="modal">
        <div class="modal-content">
            <h3>Заказ под заказ</h3>
            <textarea id="customComment" rows="3" placeholder="Напишите модель, цвет, память или любые пожелания..."></textarea>
            <button id="submitCustomBtn" class="modal-btn">Отправить заявку</button>
            <button id="closeModalBtn" class="modal-btn close-modal">Отмена</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
